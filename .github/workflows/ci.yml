name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq shellcheck inotify-tools

      - name: Install bats-core
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Install antcrate
        run: bash assets/code/install.sh

      - name: Leak scan (publication boundary)
        run: |
          $HOME/.local/bin/antcrate tool install gitleaks
          $HOME/.local/bin/antcrate scan "$GITHUB_WORKSPACE"

      - name: Run antcrate self ci (shellcheck + bats)
        run: $HOME/.local/bin/antcrate self ci

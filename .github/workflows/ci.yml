name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq shellcheck cmake g++

      - name: Install bats-core
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Install antcrate
        run: bash assets/code/install.sh

      - name: Build & test antcrate-core
        run: |
          cmake -B assets/code/core/build -S assets/code/core
          cmake --build assets/code/core/build
          ctest --test-dir assets/code/core/build --output-on-failure

      - name: Run antcrate --ci (shellcheck + bats)
        run: $HOME/.local/bin/antcrate --ci
